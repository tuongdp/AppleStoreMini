<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="manifest" href="/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Apple Store</title>

        <script>
            (function () {
                try {
                    var theme = localStorage.getItem("app-ui-theme");
                    var supportDarkMode = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;

                    if (theme === "dark" || (!theme && supportDarkMode)) {
                        document.documentElement.classList.add("dark");
                    } else {
                        document.documentElement.classList.remove("dark");
                    }
                } catch (e) {}
            })();

            window.addEventListener("error", function (e) {
                if (
                    e.message &&
                    /dynamically imported module|importing a module|Failed to fetch/i.test(e.message)
                ) {
                    window.location.reload();
                }
            });

            window.addEventListener("unhandledrejection", function (e) {
                if (
                    e.reason &&
                    e.reason.message &&
                    /dynamically imported module|importing a module|Failed to fetch/i.test(e.reason.message)
                ) {
                    window.location.reload();
                }
            });
        </script>
    </head>
    <body>
        <div id="root"></div>
        <div id="modal"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
